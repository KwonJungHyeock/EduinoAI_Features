<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Eduino · 2WD RC카 블루투스 코스</title>
<link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">
        <span class="logo-mark">ca</span>
        <span class="logo-txt">Eduino <b>AI</b><small>AIoT 코딩교육</small></span>
      </div>
      <div class="device-card">
        <div class="dev-top">🚗 2WD RC카 코스</div>
        <div class="dev-sub">블루투스 피지컬 코딩</div>
      </div>
      <nav id="nav"></nav>
    </aside>

    <main class="main">
      <div class="toolbar">
        <div class="tb-title" id="tbTitle"></div>
        <div class="tb-actions">
          <div class="fs-ctl">
            <button id="fsDown" title="글자 작게">A−</button>
            <span id="fsLabel">100%</span>
            <button id="fsUp" title="글자 크게">A+</button>
          </div>
          <button class="present-btn" id="presentBtn" title="교실 대형 화면용 확대 모드">🖥 수업 모드</button>
        </div>
      </div>
      <div class="main-scroll" id="mainScroll">
        <div id="view"></div>
      </div>
    </main>
  </div>

  <!-- 배선 설정 모달 -->
  <div class="modal-back" id="cfgBack"></div>
  <aside class="modal-cfg" id="cfgModal">
    <div class="cfg-head">
      <h3>⚙️ 배선 설정</h3>
      <button class="x" id="cfgClose">✕</button>
    </div>
    <p class="cfg-hint">실제 결선한 대로 맞추면 모든 코드가 자동으로 그에 맞게 바뀝니다.</p>
    <div class="cfg-row" style="margin-bottom:6px">
      <label>블루투스 모듈</label><div class="modpick" id="modPick"></div>
    </div>
    <div id="config"></div>
    <div id="errors" class="cfg-err"></div>
  </aside>

  <div id="toast" class="toast"></div>
<script type="module" src="./app.js"></script>
</body>
</html>
