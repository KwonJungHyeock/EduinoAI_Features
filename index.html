<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Eduino · 2WD RC카 블루투스 코스</title>
<link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="top">
    <div class="brand">
      <span class="logo">🤖</span>
      <div>
        <div class="ttl">Eduino · 2WD RC카 코스</div>
        <div class="sub">블루투스 피지컬 코딩 · 캐러셀 커리큘럼</div>
      </div>
    </div>
    <div class="top-actions">
      <div class="modpick" id="modPick"></div>
      <button class="cfgbtn" id="cfgToggle">⚙️ 배선 설정</button>
    </div>
  </header>

  <div class="chips" id="chips"></div>
  <div class="pbar"><i id="pfill"></i></div>

  <div class="viewport" id="viewport">
    <div class="track" id="track"></div>
  </div>

  <footer class="nav">
    <button id="prev" class="navbtn">← 이전</button>
    <div class="navmid" id="navmid"></div>
    <button id="next" class="navbtn primary">다음 →</button>
  </footer>

  <!-- 설정 슬라이드오버 -->
  <div class="backdrop" id="backdrop"></div>
  <aside class="cfgpanel" id="cfgpanel">
    <div class="cfghead">
      <h3>⚙️ 내 배선 설정</h3>
      <button class="xbtn" id="cfgClose">✕</button>
    </div>
    <p class="hint">실제 결선한 대로 맞추면 모든 챕터의 코드가 자동으로 그에 맞게 바뀝니다.</p>
    <div id="config"></div>
    <div id="errors" class="errors"></div>
  </aside>

  <div id="toast" class="toast"></div>
<script type="module" src="./app.js"></script>
</body>
</html>
